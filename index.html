<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Forensics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0c0a; --panel:#161410; --border:#2a2420;
  --accent:#c8922a; --accent2:#e85d3a;
  --text:#d4c9b8; --muted:#6b5f50;
  --good:#4caf7d; --bad:#e85d3a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Courier Prime',monospace;min-height:100vh;padding:24px;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,#1a1612 39px,#1a1612 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,#1a1612 39px,#1a1612 40px);
}
header{display:flex;align-items:baseline;gap:16px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:16px}
h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.08em;color:var(--accent)}
.subtitle{color:var(--muted);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase}
.workspace{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.canvas-wrap{background:var(--panel);border:1px solid var(--border);padding:12px}
.canvas-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tag{background:var(--border);padding:2px 8px;font-size:.6rem;color:var(--accent);letter-spacing:.1em}
canvas{display:block;width:100%;height:auto;background:repeating-conic-gradient(#1c1a17 0% 25%,#111 0% 50%) 0 0/12px 12px}
.controls{background:var(--panel);border:1px solid var(--border);padding:20px;margin-bottom:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.ctrl-group label{display:block;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ctrl-row{display:flex;align-items:center;gap:10px}
.ctrl-row input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);cursor:pointer;border:none;border-radius:0}
.val{font-size:.75rem;color:var(--accent);min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
.score-bar{background:var(--panel);border:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:28px}
.score-main{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1;min-width:120px;transition:color .3s}
.score-track{flex:1;height:6px;background:var(--border);position:relative}
.score-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--good),var(--accent),var(--bad));transition:width .2s ease}
.score-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:.6rem;letter-spacing:.1em;color:var(--muted)}
.score-meta{font-size:.72rem;color:var(--muted);line-height:1.8}
.score-meta strong{color:var(--text)}
.btn-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
button{font-family:'Courier Prime',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
button:hover{border-color:var(--accent);color:var(--accent)}
button.active{border-color:var(--accent);color:var(--accent);background:rgba(200,146,42,.08)}
.diff-mode-label{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.overlay-canvas-wrap{background:var(--panel);border:1px solid var(--border);padding:12px;margin-bottom:16px;display:none}
.overlay-canvas-wrap.visible{display:block}
.brush-bar{background:var(--panel);border:1px solid var(--border);padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.brush-bar label{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.brush-bar .ctrl-row{display:flex;align-items:center;gap:10px}
#origCanvas.brush-active{cursor:crosshair}
.brush-btn.active-tool{border-color:var(--accent2)!important;color:var(--accent2)!important;background:rgba(232,93,58,.12)!important}
</style>
</head>
<body>
<header>
  <h1>Ring Forensics</h1>
  <span class="subtitle">Affine-registered art comparison &middot; MAE scorer</span>
</header>

<div class="btn-row">
  <span class="diff-mode-label">Overlay:</span>
  <button id="btn-none" class="active" onclick="setMode('none')">Side by side</button>
  <button id="btn-diff" onclick="setMode('diff')">Diff heatmap</button>
  <button id="btn-reset" onclick="resetControls()">&#8635; Reset</button>
</div>

<div class="workspace" id="sideBySide">
  <div class="canvas-wrap">
    <div class="canvas-label">Original <span class="tag">BRUSH HERE</span></div>
    <canvas id="origCanvas"></canvas>
  </div>
  <div class="canvas-wrap">
    <div class="canvas-label">New (registered) <span class="tag">TRANSFORM TARGET</span></div>
    <canvas id="newCanvas"></canvas>
  </div>
</div>

<div class="overlay-canvas-wrap" id="overlayWrap">
  <div class="canvas-label" id="overlayLabel">Overlay</div>
  <canvas id="overlayCanvas"></canvas>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Hue shift (new) <span style="color:var(--accent2)">&#176;</span></label>
    <div class="ctrl-row">
      <input type="range" id="hue" min="-180" max="180" value="0" oninput="updateAll()">
      <span class="val" id="hueVal">0&deg;</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>Saturation (new)</label>
    <div class="ctrl-row">
      <input type="range" id="sat" min="0" max="300" value="100" oninput="updateAll()">
      <span class="val" id="satVal">100%</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>Brightness (new)</label>
    <div class="ctrl-row">
      <input type="range" id="bri" min="0" max="300" value="100" oninput="updateAll()">
      <span class="val" id="briVal">100%</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>Gaussian blur (new) <span style="color:var(--accent2)">px</span></label>
    <div class="ctrl-row">
      <input type="range" id="blur" min="0" max="20" value="0" step="0.5" oninput="updateAll()">
      <span class="val" id="blurVal">0px</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>Scale (new)</label>
    <div class="ctrl-row">
      <input type="range" id="scale" min="50" max="150" value="100" oninput="updateAll()">
      <span class="val" id="scaleVal">100%</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>Opacity (new)</label>
    <div class="ctrl-row">
      <input type="range" id="opacity" min="0" max="100" value="100" oninput="updateAll()">
      <span class="val" id="opacityVal">100%</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>Black point <span style="color:var(--accent2)">vmin</span></label>
    <div class="ctrl-row">
      <input type="range" id="vmin" min="0" max="254" value="0" oninput="updateAll()">
      <span class="val" id="vminVal">0</span>
    </div>
  </div>
  <div class="ctrl-group">
    <label>White point <span style="color:var(--accent2)">vmax</span></label>
    <div class="ctrl-row">
      <input type="range" id="vmax" min="1" max="255" value="255" oninput="updateAll()">
      <span class="val" id="vmaxVal">255</span>
    </div>
  </div>
</div>

<div class="brush-bar">
  <span style="font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)">Brush:</span>
  <button class="brush-btn" id="btn-brush-off" onclick="setBrushMode('off')">Off</button>
  <button class="brush-btn" id="btn-brush-blur" onclick="setBrushMode('blur')">Local blur</button>
  <button class="brush-btn" id="btn-brush-smear" onclick="setBrushMode('smear')">Smear</button>
  <button class="brush-btn" id="btn-brush-paint" onclick="setBrushMode('paint')">Paint</button>
  <input type="color" id="paintColor" value="#ff6600" title="Paint color" style="width:32px;height:28px;border:1px solid var(--border);background:none;cursor:pointer;padding:2px;border-radius:0;vertical-align:middle">
  <input type="range" id="paintOpacity" min="1" max="100" value="80" title="Paint opacity" style="width:60px" oninput="document.getElementById('paintOpVal').textContent=this.value+'%'">
  <span class="val" id="paintOpVal" style="min-width:36px">80%</span>
  <div class="ctrl-row" style="margin-left:8px">
    <label>Size&nbsp;</label>
    <input type="range" id="brushSize" min="5" max="80" value="20" oninput="document.getElementById('brushSizeVal').textContent=this.value+'px'">
    <span class="val" id="brushSizeVal">20px</span>
  </div>
  <div class="ctrl-row">
    <label>Strength&nbsp;</label>
    <input type="range" id="brushStrength" min="1" max="20" value="6" oninput="document.getElementById('brushStrStr').textContent=this.value">
    <span class="val" id="brushStrStr">6</span>
  </div>
  <button id="btn-undo-brush" onclick="undoBrush()" style="margin-left:auto">&#8630; Undo brush</button>
</div>
<div class="score-bar">
  <div>
    <div style="font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Delta from baseline</div>
    <div class="score-main" id="scoreNum">&#8212;</div>
  </div>
  <div style="flex:1">
    <div class="score-track"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
    <div class="score-labels"><span>&larr; better than baseline</span><span>worse &rarr;</span></div>
  </div>
  <div class="score-meta" id="scoreMeta">Apply transforms to score<br>similarity between images.</div>
</div>

function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return[h*360,s*100,l*100];
}

function hslToRgb(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s;
  const x=c*(1-Math.abs((h/60)%2-1));
  const m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}
  else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}
  else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return[(r+m)*255,(g+m)*255,(b+m)*255];
}

function applyTransforms(srcPixels,hueShift,satMul,briMul,vmin,vmax){
  const out=new Uint8ClampedArray(srcPixels.length);
  const range=vmax-vmin||1;
  for(let i=0;i<srcPixels.length;i+=4){
    const a=srcPixels[i+3];
    if(a===0){out[i+3]=0;continue;}
    let[hh,ss,ll]=rgbToHsl(srcPixels[i],srcPixels[i+1],srcPixels[i+2]);
    hh+=hueShift;
    ss=Math.min(100,Math.max(0,ss*satMul));
    ll=Math.min(100,Math.max(0,ll*briMul));
    let[r2,g2,b2]=hslToRgb(hh,ss,ll);
    // levels: remap [vmin,vmax] -> [0,255]
    r2=Math.min(255,Math.max(0,(r2-vmin)*(255/range)));
    g2=Math.min(255,Math.max(0,(g2-vmin)*(255/range)));
    b2=Math.min(255,Math.max(0,(b2-vmin)*(255/range)));
    out[i]=r2;out[i+1]=g2;out[i+2]=b2;out[i+3]=a;
  }
  return out;
}

function getTransformedOrig(s){
  const tmp=document.createElement('canvas');
  tmp.width=W;tmp.height=H;
  const tc=tmp.getContext('2d',{willReadFrequently:true});
  // Use brush-painted override if present
  if(origPixelOverride){
    tc.putImageData(origPixelOverride,0,0);
    if(s.blur>0||s.scale!==1){
      const snap=tc.getImageData(0,0,W,H);
      tc.clearRect(0,0,W,H);
      tc.filter=s.blur>0?`blur(${s.blur}px)`:'none';
      tc.save();
      tc.translate(W/2,H/2);
      tc.scale(s.scale,s.scale);
      tc.translate(-W/2,-H/2);
      const tmp2=document.createElement('canvas');tmp2.width=W;tmp2.height=H;
      tmp2.getContext('2d').putImageData(snap,0,0);
      tc.drawImage(tmp2,0,0,W,H);
      tc.restore();
    }
  } else {
    tc.filter=s.blur>0?`blur(${s.blur}px)`:'none';
    tc.save();
    tc.translate(W/2,H/2);
    tc.scale(s.scale,s.scale);
    tc.translate(-W/2,-H/2);
    tc.drawImage(origImg,0,0,W,H);
    tc.restore();
  }
  const id=tc.getImageData(0,0,W,H);
  const transformed=applyTransforms(id.data,s.hue,s.sat,s.bri,s.vmin,s.vmax);
  const out=new ImageData(transformed,W,H);
  // apply opacity to alpha
  if(s.opacity<1){
    for(let i=3;i<out.data.length;i+=4) out.data[i]=Math.round(out.data[i]*s.opacity);
  }
  return out;
}

let baselineMAE=null;
function buildErodedMask(od,nd,radius){
  // Build raw overlap mask
  const mask=new Uint8Array(W*H);
  for(let i=0;i<W*H;i++){
    mask[i]=(od[i*4+3]>10&&nd[i*4+3]>10)?1:0;
  }
  // Binary erosion: a pixel stays 1 only if all pixels within radius are also 1
  const eroded=new Uint8Array(W*H);
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(!mask[y*W+x]){eroded[y*W+x]=0;continue;}
      let ok=true;
      outer:for(let dy=-radius;dy<=radius;dy++){
        for(let dx=-radius;dx<=radius;dx++){
          if(dx*dx+dy*dy>radius*radius) continue;
          const nx=x+dx,ny=y+dy;
          if(nx<0||nx>=W||ny<0||ny>=H||!mask[ny*W+nx]){ok=false;break outer;}
        }
      }
      eroded[y*W+x]=ok?1:0;
    }
  }
  return eroded;
}

function computeSAE(od,nd){
  const mask=buildErodedMask(od,nd,3);
  let sum=0,count=0;
  for(let i=0;i<W*H;i++){
    if(!mask[i]) continue;
    const b=i*4;
    sum+=Math.abs(od[b]-nd[b]);
    sum+=Math.abs(od[b+1]-nd[b+1]);
    sum+=Math.abs(od[b+2]-nd[b+2]);
    count+=3;
  }
  return count>0?{sae:sum,count:count}:null;
}

function fmtSAE(v){
  if(v>=1e6) return (v/1e6).toFixed(2)+'M';
  if(v>=1e3) return (v/1e3).toFixed(1)+'k';
  return v.toFixed(0);
}

function updateScore(result){
  const el=document.getElementById('scoreNum');
  const fill=document.getElementById('scoreFill');
  const meta=document.getElementById('scoreMeta');
  if(!result){el.textContent='—';fill.style.width='0%';meta.innerHTML='No overlapping pixels.';return;}
  const {sae,count}=result;
  // Capture baseline on first call
  if(baselineMAE===null) baselineMAE=sae;
  const delta=sae-baselineMAE;
  const sign=delta>=0?'+':'';
  const pctDelta=baselineMAE>0?((delta/baselineMAE)*100):0;
  // Fill bar: baseline = 50%, worse goes right, better goes left
  const fillPct=Math.min(100,Math.max(0,50+pctDelta*0.4));
  const deltaStr=(delta===0?'±0':(sign+fmtSAE(delta)));
  el.textContent=deltaStr;
  fill.style.width=fillPct+'%';
  let verdict,color;
  if(delta<=0){verdict='Better than baseline';color='var(--good)';}
  else if(pctDelta<3){verdict='Roughly baseline';color='var(--good)';}
  else if(pctDelta<12){verdict='Slightly worse';color='var(--accent)';}
  else if(pctDelta<30){verdict='Worse than baseline';color='var(--accent)';}
  else{verdict='Much worse';color='var(--bad)';}
  el.style.color=color;
  const mae=(sae/count).toFixed(2);
  meta.innerHTML=`<strong style="color:${color}">${verdict}</strong> (${sign}${pctDelta.toFixed(1)}%)<br>SAE: <strong>${fmtSAE(sae)}</strong>&nbsp;&nbsp;baseline: ${fmtSAE(baselineMAE)}<br>MAE: ${mae} &nbsp; px: ${(count/3).toLocaleString()}`;
}

function drawDiff(od,nd){
  const out=new ImageData(W,H);
  for(let i=0;i<od.length;i+=4){
    if(od[i+3]>10&&nd[i+3]>10){
      const d=(Math.abs(od[i]-nd[i])+Math.abs(od[i+1]-nd[i+1])+Math.abs(od[i+2]-nd[i+2]))/3;
      const t=d/255;
      out.data[i]=Math.round(255*Math.min(1,t*3));
      out.data[i+1]=Math.round(255*Math.max(0,Math.min(1,t*3-1)));
      out.data[i+2]=Math.round(255*Math.max(0,1-t*3));
      out.data[i+3]=255;
    }
  }
  overlayCtx.putImageData(out,0,0);
}

function updateAll(){
  if(!origReady||!regReady)return;
  const s=getSliders();
  updateLabels(s);
  // new (registered) is the fixed reference — draw it raw
  newCtx.clearRect(0,0,W,H);
  newCtx.drawImage(regImg,0,0,W,H);
  const nd=newCtx.getImageData(0,0,W,H).data;
  // original gets the transforms applied
  const origId=getTransformedOrig(s);
  origCtx.clearRect(0,0,W,H);
  origCtx.putImageData(origId,0,0);
  const saeResult=computeSAE(origId.data,nd);
  updateScore(saeResult);
  if(currentMode!=='none'){
    overlayCanvas.width=W;overlayCanvas.height=H;
    overlayCtx.clearRect(0,0,W,H);
    if(currentMode==='diff'){
      document.getElementById('overlayLabel').textContent='Diff heatmap  (black=same \u00b7 red=max diff)';
      drawDiff(origId.data,nd);
    }
  }
}

// ── Brush state ──────────────────────────────────────────────────────────────
let brushMode='off';
let brushSnapshot=null; // pixel snapshot before stroke for undo
// origPixelOverride: per-pixel override on top of origImg. null = use origImg.
let origPixelOverride=null;

function setBrushMode(mode){
  brushMode=mode;
  document.querySelectorAll('.brush-btn').forEach(b=>b.classList.remove('active-tool'));
  if(mode!=='off') document.getElementById('btn-brush-'+mode).classList.add('active-tool');
  origCanvas.classList.toggle('brush-active', mode!=='off');
}

function ensureOverride(){
  if(!origPixelOverride){
    // seed from current origId pixels
    const tmp=document.createElement('canvas');
    tmp.width=W;tmp.height=H;
    const tc=tmp.getContext('2d');
    tc.drawImage(origImg,0,0,W,H);
    origPixelOverride=tc.getImageData(0,0,W,H);
  }
}

function undoBrush(){
  if(brushSnapshot){
    origPixelOverride=new ImageData(new Uint8ClampedArray(brushSnapshot.data),W,H);
    brushSnapshot=null;
    updateAll();
  } else {
    origPixelOverride=null;
    updateAll();
  }
}

// Local blur: box-blur pixels in radius around point
function applyLocalBlur(x,y,radius,passes){
  ensureOverride();
  const d=origPixelOverride.data;
  for(let p=0;p<passes;p++){
    const snap=new Uint8ClampedArray(d);
    for(let py=Math.max(0,y-radius);py<=Math.min(H-1,y+radius);py++){
      for(let px=Math.max(0,x-radius);px<=Math.min(W-1,x+radius);px++){
        const dx=px-x,dy=py-y;
        if(dx*dx+dy*dy>radius*radius) continue;
        let r=0,g=0,b=0,a=0,n=0;
        const kr=Math.ceil(radius*0.4);
        for(let ky=-kr;ky<=kr;ky++){
          for(let kx=-kr;kx<=kr;kx++){
            const nx=px+kx,ny=py+ky;
            if(nx<0||nx>=W||ny<0||ny>=H) continue;
            const idx=(ny*W+nx)*4;
            r+=snap[idx];g+=snap[idx+1];b+=snap[idx+2];a+=snap[idx+3];n++;
          }
        }
        const idx=(py*W+px)*4;
        d[idx]=r/n;d[idx+1]=g/n;d[idx+2]=b/n;d[idx+3]=a/n;
      }
    }
  }
}

// Smear: drag colours in direction of mouse movement
let lastSmearX=null,lastSmearY=null;
function applySmear(x,y,radius){
  if(lastSmearX===null){lastSmearX=x;lastSmearY=y;return;}
  ensureOverride();
  const d=origPixelOverride.data;
  const dx=x-lastSmearX,dy=y-lastSmearY;
  if(Math.abs(dx)<1&&Math.abs(dy)<1) return;
  const len=Math.sqrt(dx*dx+dy*dy);
  const ndx=dx/len,ndy=dy/len;
  for(let py=Math.max(0,y-radius);py<=Math.min(H-1,y+radius);py++){
    for(let px=Math.max(0,x-radius);px<=Math.min(W-1,x+radius);px++){
      const cdx=px-x,cdy=py-y;
      if(cdx*cdx+cdy*cdy>radius*radius) continue;
      // sample from upstream direction
      const sx=Math.round(px-ndx*len*0.5);
      const sy=Math.round(py-ndy*len*0.5);
      if(sx<0||sx>=W||sy<0||sy>=H) continue;
      const srcIdx=(sy*W+sx)*4;
      const dstIdx=(py*W+px)*4;
      const t=0.55;
      d[dstIdx]  =d[dstIdx]  *(1-t)+d[srcIdx]  *t;
      d[dstIdx+1]=d[dstIdx+1]*(1-t)+d[srcIdx+1]*t;
      d[dstIdx+2]=d[dstIdx+2]*(1-t)+d[srcIdx+2]*t;
    }
  }
  lastSmearX=x;lastSmearY=y;
}

// Convert canvas mouse position to image coords
function canvasToImg(canvas,evt){
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  const scaleY=H/rect.height;
  return {x:Math.round((evt.clientX-rect.left)*scaleX),
          y:Math.round((evt.clientY-rect.top)*scaleY)};
}

let isPainting=false;
origCanvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  // Right-click: eyedropper — pick color from current origCanvas pixels
  const pos=canvasToImg(origCanvas,e);
  const px=origCtx.getImageData(pos.x,pos.y,1,1).data;
  const hex='#'+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  document.getElementById('paintColor').value=hex;
  // Switch to paint mode automatically
  setBrushMode('paint');
});
origCanvas.addEventListener('mousedown',e=>{
  if(brushMode==='off') return;
  if(e.button!==0) return;
  isPainting=true;
  ensureOverride();
  brushSnapshot=new ImageData(new Uint8ClampedArray(origPixelOverride.data),W,H);
  lastSmearX=null;lastSmearY=null;
  const pos=canvasToImg(origCanvas,e);
  doBrush(pos.x,pos.y);
});
origCanvas.addEventListener('mousemove',e=>{
  if(!isPainting||brushMode==='off') return;
  const pos=canvasToImg(origCanvas,e);
  doBrush(pos.x,pos.y);
});
origCanvas.addEventListener('mouseup',()=>{ isPainting=false;lastSmearX=null;lastSmearY=null; });
origCanvas.addEventListener('mouseleave',()=>{ isPainting=false;lastSmearX=null;lastSmearY=null; });

function applyPaint(x,y,radius){
  ensureOverride();
  const d=origPixelOverride.data;
  const hex=document.getElementById('paintColor').value;
  const pr=parseInt(hex.slice(1,3),16);
  const pg=parseInt(hex.slice(3,5),16);
  const pb=parseInt(hex.slice(5,7),16);
  const alpha=parseInt(document.getElementById('paintOpacity').value)/100;
  for(let py=Math.max(0,y-radius);py<=Math.min(H-1,y+radius);py++){
    for(let px=Math.max(0,x-radius);px<=Math.min(W-1,x+radius);px++){
      const dx=px-x,dy=py-y;
      // soft round brush: linear falloff
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>radius) continue;
      const t=alpha*(1-dist/radius);
      const idx=(py*W+px)*4;
      if(d[idx+3]<10) continue; // don't paint transparent areas
      d[idx]  =Math.round(d[idx]  *(1-t)+pr*t);
      d[idx+1]=Math.round(d[idx+1]*(1-t)+pg*t);
      d[idx+2]=Math.round(d[idx+2]*(1-t)+pb*t);
    }
  }
}

function doBrush(x,y){
  const r=parseInt(document.getElementById('brushSize').value);
  const str=parseInt(document.getElementById('brushStrength').value);
  if(brushMode==='blur') applyLocalBlur(x,y,r,str);
  else if(brushMode==='smear') applySmear(x,y,r);
  else if(brushMode==='paint') applyPaint(x,y,r);
  updateAll();
}

function loadImages(){
  origImg.crossOrigin='anonymous';
  regImg.crossOrigin='anonymous';
  origImg.onload=()=>{
    W=origImg.naturalWidth;H=origImg.naturalHeight;
    origCanvas.width=W;origCanvas.height=H;
    newCanvas.width=W;newCanvas.height=H;
    origReady=true;if(regReady)updateAll();
  };
  regImg.onload=()=>{regReady=true;if(origReady)updateAll();};
  origImg.src='data:image/png;base64,'+ORIG_B64;
  regImg.src='data:image/png;base64,'+REG_B64;
}
loadImages();
</script>
